<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Inspeksi Harian Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-center text-slate-700 mb-2">Jadwal Operasional Tim</h1>
        <p class="text-center text-slate-500 font-medium mb-6" id="periodDisplay">
            Periode: -
        </p>

        <div class="flex flex-wrap justify-center items-center gap-4 mb-8">
            <button onclick="resetToCurrentPeriod()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-semibold transition shadow-sm">Bulan Ini</button>
            <button onclick="changePeriod(1)" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold transition shadow-sm">Periode Berikutnya &raquo;</button>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b pb-4">
            <div class="flex flex-col md:flex-row items-center gap-4">
                <h2 class="text-xl font-bold text-slate-700" id="tableTitle">Jadwal Harian</h2>

                <div id="dayNav" class="flex items-center gap-1.5 hidden bg-slate-100 p-1.5 rounded-lg shadow-inner">
                    <button onclick="changeDay(-1)" class="p-1.5 bg-white hover:bg-slate-200 rounded shadow-sm text-slate-700 transition" title="Hari Sebelumnya">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <span id="currentDayDisplay" class="text-sm font-bold text-slate-700 w-36 text-center">...</span>
                    <button onclick="changeDay(1)" class="p-1.5 bg-white hover:bg-slate-200 rounded shadow-sm text-slate-700 transition" title="Hari Berikutnya">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                    <button onclick="resetToToday()" class="px-2 py-1.5 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 rounded shadow-sm text-xs font-bold transition ml-1">Hari Ini</button>
                </div>
            </div>

            <button id="toggleBtn" onclick="toggleView()" class="flex items-center gap-2 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-4 py-2 rounded-lg font-semibold transition shadow-sm">
                <span id="toggleIcon"></span>
                <span id="toggleText">Lihat Semua Jadwal</span>
            </button>
        </div>

        <div id="scheduleContainer" class="mb-8 transition-all duration-300">
        </div>
    </div>

    <script>
        const members = ['Delka', 'Ardi', 'Uts', 'Syarif', 'Agung', 'Salmon', 'Syam', 'Resky'];
        const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

        const highCalorie = {
            Senin: ['Delka',
                'Ardi',
                'Uts'],
            Selasa: ['Syarif',
                'Agung'],
            Rabu: ['Salmon',
                'Uts',
                'Syam'],
            Kamis: ['Delka',
                'Syarif'],
            Jumat: ['Salmon',
                'Resky'],
            Sabtu: ['Agung',
                'Resky'],
            Minggu: ['Ardi',
                'Syam']
        };

        const daysOff = {
            Senin: [],
            Selasa: ['Resky',
                'Syam'],
            Rabu: ['Ardi'],
            Kamis: ['Salmon'],
            Jumat: [],
            Sabtu: ['Uts',
                'Syarif'],
            Minggu: ['Delka',
                'Agung']
        };

        const piketSchedule = {
            Senin: ['Delka',
                'Syam',
                'Ardi'],
            Selasa: ['Salmon',
                'Uts',
                'Syarif'],
            Rabu: ['Resky',
                'Agung'],
            Kamis: ['Delka',
                'Syam',
                'Ardi'],
            Jumat: [],
            Sabtu: ['Resky',
                'Agung'],
            Minggu: ['Salmon',
                'Uts',
                'Syarif']
        };

        let currentMonth = new Date().getDate() > 20 ? new Date().getMonth() + 2: new Date().getMonth() + 1;
        let currentYear = new Date().getFullYear();
        if (currentMonth > 12) {
            currentMonth = 1; currentYear++;
        }

        let showAll = false;
        let displayDate = new Date();
        displayDate.setHours(0, 0, 0, 0);

        function getPeriodDates(month, year) {
            let dates = [];
            let startYear = month === 1 ? year - 1: year;
            let startMonth = month === 1 ? 12: month - 1;
            let startDate = new Date(startYear, startMonth - 1, 21);
            let endDate = new Date(year, month - 1, 20);

            let curr = new Date(startDate);
            while (curr <= endDate) {
                dates.push(new Date(curr));
                curr.setDate(curr.getDate() + 1);
            }
            return dates;
        }

        function formatDate(date) {
            return new Intl.DateTimeFormat('id-ID', {
                day: 'numeric', month: 'long', year: 'numeric'
            }).format(date);
        }

        function getPermutations(arr) {
            if (arr.length <= 1) return [arr];
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                let current = arr[i];
                let remaining = arr.slice(0, i).concat(arr.slice(i + 1));
                let remainingPerms = getPermutations(remaining);
                for (let perm of remainingPerms) {
                    result.push([current].concat(perm));
                }
            }
            return result;
        }

        function generatePeriodSchedule(month, year) {
            let dates = getPeriodDates(month, year);
            let periodShiftCounts = {};
            members.forEach(m => periodShiftCounts[m] = 0);

            let scheduleData = [];
            let previousDayOrder = [];

            // Titik patokan: Senin, 30 Maret 2026 (Awal Siklus Malam)
            const epochDate = new Date(2026, 2, 30);
            epochDate.setHours(0, 0, 0, 0);

            dates.forEach((dateObj, index) => {
                let dayName = dayNames[dateObj.getDay()];

                let tempDate = new Date(dateObj);
                tempDate.setHours(0, 0, 0, 0);
                let diffTime = tempDate.getTime() - epochDate.getTime();
                let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                let cycleDay = ((diffDays % 21) + 21) % 21;

                let cycleIndex = 0;
                let isOffTim = false;
                let shiftName = "";
                let shiftColorClass = "";

                if (cycleDay >= 0 && cycleDay <= 6) {
                    cycleIndex = 0;
                    shiftName = "🌙 Shift Malam";
                    shiftColorClass = "bg-slate-800 text-slate-100 border border-slate-900 shadow-sm";
                } else if (cycleDay === 7) {
                    cycleIndex = 1;
                    isOffTim = true;
                    shiftName = "🌴 OFF TIM";
                    shiftColorClass = "bg-red-100 text-red-800 border border-red-200";
                } else if (cycleDay >= 8 && cycleDay <= 14) {
                    cycleIndex = 1;
                    shiftName = "☀️ Shift Pagi";
                    shiftColorClass = "bg-sky-100 text-sky-700 border border-sky-300 shadow-sm";
                } else if (cycleDay >= 15 && cycleDay <= 20) {
                    cycleIndex = 2;
                    shiftName = "⛅ Shift Sore";
                    shiftColorClass = "bg-orange-100 text-orange-700 border border-orange-300 shadow-sm";
                }

                let offTinggi = highCalorie[dayName];
                let offLibur = daysOff[dayName];
                let unavailable = [...offTinggi,
                    ...offLibur];

                let available = members.filter(m => !unavailable.includes(m));
                let selected = [];
                let standby = [];
                let piketToday = [];
                let validOrder = [];
                let copyoOrder = [];

                if (!isOffTim) {
                    let priorityList = [...members];
                    for (let i = 0; i < index % members.length; i++) {
                        priorityList.push(priorityList.shift());
                    }

                    available.sort((a, b) => {
                        if (periodShiftCounts[a] !== periodShiftCounts[b]) return periodShiftCounts[a] - periodShiftCounts[b];
                        return priorityList.indexOf(a) - priorityList.indexOf(b);
                    });

                    if (dayName === 'Senin') {
                        selected = available;
                        standby = [];
                    } else {
                        selected = available.slice(0, 4);
                        standby = available.slice(4);
                    }

                    selected.forEach(m => periodShiftCounts[m]++);

                    piketToday = [...piketSchedule[dayName]];
                    if (dayName === 'Jumat') {
                        if (cycleIndex === 0) piketToday = ['Delka',
                            'Ardi',
                            'Syam'];
                        else if (cycleIndex === 1) piketToday = ['Salmon',
                            'Uts',
                            'Syarif'];
                        else if (cycleIndex === 2) piketToday = ['Resky',
                            'Agung'];
                    }

                    if (selected.length > 0) {
                        let perms = getPermutations(selected);
                        let validPerms = [];

                        for (let perm of perms) {
                            let isNoRepeat = true;
                            if (previousDayOrder.length > 0) {
                                for (let i = 0; i < perm.length; i++) {
                                    if (perm[i] === previousDayOrder[i]) {
                                        isNoRepeat = false; break;
                                    }
                                }
                            }

                            let inspectLast = perm[perm.length - 1];
                            let copyoLast = perm[0];
                            let isNotPiketLast = !piketToday.includes(inspectLast) && !piketToday.includes(copyoLast);

                            if (isNoRepeat && isNotPiketLast) validPerms.push(perm);
                        }

                        if (validPerms.length === 0) {
                            validPerms = perms.filter(perm => {
                                let inspectLast = perm[perm.length - 1];
                                let copyoLast = perm[0];
                                return !piketToday.includes(inspectLast) && !piketToday.includes(copyoLast);
                            });
                            if (validPerms.length === 0) validPerms = perms;
                        }

                        let pickIndex = (dateObj.getDate() * 7) % validPerms.length;
                        validOrder = validPerms[pickIndex];
                    }

                    previousDayOrder = validOrder;

                    copyoOrder = [...validOrder];
                    if (copyoOrder.length > 1) {
                        copyoOrder.push(copyoOrder.shift());
                    }
                } else {
                    previousDayOrder = [];
                }

                scheduleData.push({
                    dateStr: formatDate(dateObj),
                    dayName: dayName,
                    isOffTim: isOffTim,
                    shiftName: shiftName,
                    shiftColorClass: shiftColorClass,
                    offKalori: offTinggi,
                    offLibur: offLibur,
                    piket: piketToday,
                    standby: standby,
                    inspectionTeam: validOrder,
                    copyoTeam: copyoOrder
                });
            });

            return {
                dates, scheduleData
            };
        }

        function changeDay(delta) {
            displayDate.setDate(displayDate.getDate() + delta);

            let requiredMonth = displayDate.getDate() > 20 ? displayDate.getMonth() + 2: displayDate.getMonth() + 1;
            let requiredYear = displayDate.getFullYear();
            if (requiredMonth > 12) {
                requiredMonth = 1; requiredYear++;
            }
            if (requiredMonth < 1) {
                requiredMonth = 12; requiredYear--;
            }

            currentMonth = requiredMonth;
            currentYear = requiredYear;

            renderUI();
        }

        function toggleView() {
            showAll = !showAll; renderUI();
        }

        function renderUI() {
            const {
                dates,
                scheduleData
            } = generatePeriodSchedule(currentMonth, currentYear);

            let startDateStr = formatDate(dates[0]);
            let endDateStr = formatDate(dates[dates.length - 1]);
            document.getElementById('periodDisplay').innerText = `Periode: ${startDateStr} - ${endDateStr}`;

            let targetStr = formatDate(displayDate);
            let realTodayStr = formatDate(new Date());

            const tableTitle = document.getElementById('tableTitle');
            const dayNav = document.getElementById('dayNav');
            const currentDayDisplay = document.getElementById('currentDayDisplay');
            const toggleText = document.getElementById('toggleText');
            const toggleIcon = document.getElementById('toggleIcon');
            const container = document.getElementById('scheduleContainer');

            const iconTable = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>`;
            const iconList = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" /></svg>`;

            if (!showAll) {
                tableTitle.innerText = "Jadwal Harian";
                dayNav.classList.remove('hidden');

                currentDayDisplay.innerText = targetStr === realTodayStr ? "Hari Ini": targetStr;

                toggleText.innerText = "Lihat Semua Jadwal";
                toggleIcon.innerHTML = iconTable;

                let todayData = scheduleData.filter(row => row.dateStr === targetStr);

                if (todayData.length === 0) {
                    container.innerHTML = `<div class="p-8 text-center text-slate-500 bg-slate-50 rounded-xl border border-dashed border-slate-300">Data jadwal untuk tanggal ini tidak ditemukan di rentang periode.</div>`;
                } else {
                    let row = todayData[0];

                    // HEADER KARTU BESERTA INDIKATOR SHIFT
                    let headerTitleHtml = `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5 border-b border-slate-200 pb-4">
                    <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    ${row.dayName}, ${row.dateStr}
                    ${targetStr === realTodayStr ? '<span class="bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider ml-2">Hari Ini</span>': ''}
                    </h3>
                    <span class="px-3 py-1 text-xs font-bold rounded-full tracking-wide ${row.shiftColorClass}">
                    ${row.shiftName}
                    </span>
                    </div>
                    `;

                    if (row.isOffTim) {
                        container.innerHTML = `
                        <div class="p-8 sm:p-10 rounded-xl border shadow-sm border-indigo-300 bg-indigo-50 text-center relative overflow-hidden">
                        ${headerTitleHtml}
                        <span class="text-5xl block mb-4 mt-2">🌴</span>
                        <h3 class="text-2xl font-black text-indigo-800 mb-2 tracking-wide uppercase">OFF TIM</h3>
                        <p class="text-indigo-600 font-medium text-lg">Jadwal dikosongkan untuk peralihan Shift Malam ke Shift Pagi.</p>
                        </div>
                        `;
                    } else {
                        let liburHtml = row.offLibur.length ? row.offLibur.map(n => `<span class="bg-slate-200 text-slate-700 px-2 py-1 rounded shadow-sm text-sm font-medium">💤 ${n}</span>`).join(' '): '<span class="text-slate-400 text-sm italic">Nihil</span>';
                        let tinggiHtml = row.offKalori.length ? row.offKalori.map(n => `<span class="bg-red-100 text-red-700 px-2 py-1 rounded shadow-sm text-sm font-medium">🛑 ${n}</span>`).join(' '): '<span class="text-slate-400 text-sm italic">Nihil</span>';
                        let piketHtml = row.piket.length ? row.piket.map(n => `<span class="bg-teal-100 text-teal-700 px-2 py-1 rounded shadow-sm text-sm font-medium">🧹 ${n}</span>`).join(' '): '<span class="text-slate-400 text-sm italic">Nihil</span>';
                        let standbyHtml = row.standby.length ? row.standby.map(n => `<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded shadow-sm text-sm font-medium">☕ ${n}</span>`).join(' '): '<span class="text-slate-400 text-sm italic">Nihil</span>';

                        let inspectList = row.inspectionTeam.map((n, i) => `<li class="flex items-center gap-3 bg-white px-3 py-2 rounded border border-emerald-100 shadow-sm"><span class="font-bold text-emerald-600 w-4">${i + 1}.</span> <span class="font-medium">${n} ${row.piket.includes(n) ? '<span class="text-[10px] bg-teal-500 text-white px-1.5 py-0.5 rounded font-bold ml-1">Piket</span>': ''}</span></li>`).join('');
                        let copyoList = row.copyoTeam.map((n, i) => `<li class="flex items-center gap-3 bg-white px-3 py-2 rounded border border-amber-100 shadow-sm"><span class="font-bold text-amber-500 w-4">${i + 1}.</span> <span class="font-medium">${n} ${row.piket.includes(n) ? '<span class="text-[10px] bg-teal-500 text-white px-1.5 py-0.5 rounded font-bold ml-1">Piket</span>': ''}</span></li>`).join('');

                        container.innerHTML = `
                        <div class="p-6 rounded-xl border shadow-sm ${targetStr === realTodayStr ? 'border-indigo-500 ring-2 ring-indigo-200 bg-indigo-50/10': 'border-slate-300 bg-white'}">
                        ${headerTitleHtml}
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-6 border-b border-slate-100 pb-5">
                        <div><p class="text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-2">Libur Mingguan</p><div class="flex flex-wrap gap-2">${liburHtml}</div></div>
                        <div><p class="text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-2">Kalori Tinggi</p><div class="flex flex-wrap gap-2">${tinggiHtml}</div></div>
                        <div><p class="text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-2">Tim Piket</p><div class="flex flex-wrap gap-2">${piketHtml}</div></div>
                        <div><p class="text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-2">Standby</p><div class="flex flex-wrap gap-2">${standbyHtml}</div></div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-emerald-50 p-4 rounded-lg border border-emerald-100">
                        <h4 class="font-bold text-emerald-700 mb-3 flex items-center gap-2">🔎 Urutan Inspeksi</h4>
                        <ul class="space-y-2 text-emerald-900 text-sm">${inspectList}</ul>
                        </div>
                        <div class="bg-amber-50 p-4 rounded-lg border border-amber-100">
                        <h4 class="font-bold text-amber-700 mb-3 flex items-center gap-2">📝 Urutan Copyo</h4>
                        <ul class="space-y-2 text-amber-900 text-sm">${copyoList}</ul>
                        </div>
                        </div>
                        </div>
                        `;
                    }
                }
            } else {
                tableTitle.innerText = "Semua Jadwal Periode Ini";
                dayNav.classList.add('hidden');
                toggleText.innerText = "Tampilkan Harian";
                toggleIcon.innerHTML = iconList;

                let tbodyHTML = scheduleData.map((row, idx) => {
                    let isToday = row.dateStr === realTodayStr;
                    let trClass = isToday ? "bg-indigo-50 border-l-4 border-indigo-500": (idx % 2 === 0 ? "bg-white hover:bg-slate-50": "bg-slate-50 hover:bg-slate-100");

                    if (row.isOffTim) {
                        return `
                        <tr class="${trClass}">
                        <td class="p-2 text-slate-600 text-xs whitespace-nowrap ${isToday ? 'font-bold text-indigo-700': ''}">${row.dateStr}</td>
                        <td class="p-2 font-semibold text-slate-800 text-xs">
                        ${row.dayName} <br>
                        <span class="inline-block mt-1 px-1.5 py-0.5 text-[9px] font-bold rounded tracking-wider ${row.shiftColorClass}">${row.shiftName}</span>
                        </td>
                        <td colspan="6" class="p-2 text-center bg-indigo-100 text-indigo-800 font-bold tracking-widest uppercase text-xs">
                        🌴 OFF TIM (Peralihan Malam ke Pagi)
                        </td>
                        </tr>
                        `;
                    }

                    let liburLabel = row.offLibur.length ? row.offLibur.join(', '): '-';
                    let piketLabel = row.piket.length ? `<span class="text-teal-700 font-bold">${row.piket.join(', ')}</span>`: '-';
                    let standbyLabel = row.standby.length ? `<span class="text-blue-600 font-medium">${row.standby.join(', ')}</span>`: '-';

                    let inspectHtml = row.inspectionTeam.map((n, i) => `<span class="inline-block bg-white border border-emerald-300 rounded px-1.5 py-0.5 m-0.5 text-xs shadow-sm text-emerald-700"><span class="font-bold">${i + 1}.</span> ${n}</span>`).join('');
                    let copyoHtml = row.copyoTeam.map((n, i) => `<span class="inline-block bg-white border border-amber-300 rounded px-1.5 py-0.5 m-0.5 text-xs shadow-sm text-amber-700"><span class="font-bold">${i + 1}.</span> ${n}</span>`).join('');

                    return `
                    <tr class="${trClass}">
                    <td class="p-2 text-slate-600 text-xs whitespace-nowrap ${isToday ? 'font-bold text-indigo-700': ''}">${row.dateStr}</td>
                    <td class="p-2 font-semibold text-slate-800 text-xs">
                    ${row.dayName} <br>
                    <span class="inline-block mt-1 px-1.5 py-0.5 text-[9px] font-bold rounded tracking-wider ${row.shiftColorClass}">${row.shiftName}</span>
                    </td>
                    <td class="p-2 text-slate-500 text-xs font-medium">${liburLabel}</td>
                    <td class="p-2 text-red-500 text-xs font-medium">${row.offKalori.join(', ')}</td>
                    <td class="p-2 text-xs">${piketLabel}</td>
                    <td class="p-2 text-xs">${standbyLabel}</td>
                    <td class="p-2 border-r border-slate-100 min-w-[180px]">${inspectHtml}</td>
                    <td class="p-2 bg-slate-50 bg-opacity-50 min-w-[180px]">${copyoHtml}</td>
                    </tr>
                    `;
                }).join('');

                container.innerHTML = `
                <div class="overflow-x-auto overflow-y-auto max-h-[600px] border rounded-lg shadow-inner">
                <table class="w-full text-left border-collapse relative min-w-[1100px]">
                <thead class="sticky top-0 z-10 shadow-sm text-xs">
                <tr class="bg-slate-800 text-white">
                <th class="p-2 border-b border-slate-700">Tanggal</th>
                <th class="p-2 border-b border-slate-700">Hari / Shift</th>
                <th class="p-2 border-b border-slate-700 text-slate-300">Off Mingguan</th>
                <th class="p-2 border-b border-slate-700 text-red-300">Kalori Tinggi</th>
                <th class="p-2 border-b border-slate-700 text-teal-300">Tugas Piket</th>
                <th class="p-2 border-b border-slate-700 text-blue-300">Standby</th>
                <th class="p-2 border-b border-slate-700">Urutan Inspeksi</th>
                <th class="p-2 border-b border-slate-700 bg-slate-700">Urutan Copyo</th>
                </tr>
                </thead>
                <tbody class="bg-white">
                ${tbodyHTML}
                </tbody>
                </table>
                </div>
                `;
            }
        }

        function changePeriod(delta) {
            currentMonth += delta;
            if (currentMonth > 12) {
                currentMonth = 1; currentYear++;
            } else if (currentMonth < 1) {
                currentMonth = 12; currentYear--;
            }
            renderUI();
        }

        function resetToToday() {
            displayDate = new Date();
            displayDate.setHours(0, 0, 0, 0);
            resetToCurrentPeriod();
        }

        function resetToCurrentPeriod() {
            let today = new Date();
            if (today.getDate() > 20) {
                currentMonth = today.getMonth() + 2;
            } else {
                currentMonth = today.getMonth() + 1;
            }
            currentYear = today.getFullYear();
            if (currentMonth > 12) {
                currentMonth = 1; currentYear++;
            }
            renderUI();
        }

        renderUI();
    </script>
</body>
</html>
